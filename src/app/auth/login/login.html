<div class="row pt-5">
  <div class="col-6 offset-3 mt-5">
    <div class="card">
      <div class="card-body p-0">
        <div class="row">
          <div class="col-6 p-0 bg-success text-white" style="border-top-left-radius: 5px; border-bottom-left-radius: 5px;">

          </div>
          <div class="col-6 p-3 pe-4">
            <div class="form-group">
              <strong>Iniciar Sesión</strong><br>
              <span class="text-secondary">Ingresa tus credenciales para ingresar al sistema.</span>
            </div>
            <div class="form-group">
              <small class="text-secondary">Nombre de Usuario</small>
              <input type="text" class="form-control">
            </div>
            <div class="form-group">
              <small class="text-secondary">Contraseña</small>
              <input type="password" name="" id="" class="form-control">
            </div>
            <div class="form-group mt-5 text-end">
              <button class="btn btn-primary" (click)="login()">
                <i class="fa fa-arrow-right me-1"></i>Continuar
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
